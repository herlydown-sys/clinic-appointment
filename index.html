<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/src/assets/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Xynab Solutions Tech Education | Enhance Industrial Experience" />
    <title>Xynab Solutions Tech Education | Enhance Industrial Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="error-log" style="color: red; background: white; padding: 20px; z-index: 99999; position: fixed; top: 0; left: 0; width: 100vw; display: none; font-family: monospace;"></div>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        document.getElementById('error-log').style.display = 'block';
        document.getElementById('error-log').innerHTML += '<p><strong>Error:</strong> ' + message + '<br/>Location: ' + source + ':' + lineno + ':' + colno + '<br/>' + (error && error.stack ? error.stack.replace(/\n/g, '<br/>') : '') + '</p>';
      };
      window.onunhandledrejection = function(event) {
        document.getElementById('error-log').style.display = 'block';
        document.getElementById('error-log').innerHTML += '<p><strong>Unhandled Promise Rejection:</strong> ' + event.reason + '</p>';
      };
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
